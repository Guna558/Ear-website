<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

<title>Contact - ENT Center</title>

<link rel="stylesheet" href="contact.css">
</head>

<body>


<nav class="navbar navbar-dark bg-dark">
<div class="container">
    <span class="navbar-brand">ENT Center</span>
</div>
</nav>

<section class="hero d-flex align-items-center">
<div class="container text-center">

    <h1 class="mb-4">Contact Us</h1>

    <div class="contact-box mx-auto" style="max-width: 400px;">
        
        <input type="text" class="form-control mb-3" placeholder="Enter full name">
        
        <input type="email" class="form-control mb-3" placeholder="Enter email address">
        
        <button class="btn btn-warning btn-block">Submit</button>

    </div>

</div>
</section>

<section class="py-5">
<div class="container">

<div class="row text-center">

<div class="col-md-4 mb-4">
    <div class="info-card">
        <h4>Call Us</h4>
        <p>+91 667967455<br>+91 667967455</p>
    </div>
</div>

<div class="col-md-4 mb-4">
    <div class="info-card">
        <h4>Location</h4>
        <p>KBHP, Hyderabad, Telangana</p>
    </div>
</div>

<div class="col-md-4 mb-4">
    <div class="info-card">
        <h4>Hours</h4>
        <p>10:00 AM - 9:00 PM</p>
    </div>
</div>

</div>

</div>
</section>



<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>

</body>
</html>
